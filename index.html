<!DOCTYPE html>
<html lang="en">

	
	<script>
		if (navigator.appName =="Netscape")
			var language = navigator.language; else var language = navigator.browserLanguage;
		if (language.indexOf("en") > -1) document.location.href = "menu_en.html";
		else if (language.indexOf("es") > -1) document.location.href ="menu_es.html";
		else
			document.location.href ="menu_en.html";
	</script>
